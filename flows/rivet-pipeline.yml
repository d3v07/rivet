name: "Rivet DevSecOps Pipeline"
description: "End-to-end autonomous DevSecOps flow: ingests Jira backlog, generates execution plans, implements code via TDD, runs security review, and deploys to the lowest-carbon GCP region."
public: true
definition:
  version: v1
  environment: ambient

  components:
    - name: "planner"
      type: AgentComponent
      prompt_id: "planner_prompt"
      inputs:
        - "context:goal"
      toolset: ["read_file", "read_files"]
      ui_log_events:
        - on_agent_final_answer

    - name: "developer"
      type: AgentComponent
      prompt_id: "developer_prompt"
      inputs:
        - "context:goal"
        - "planner:output"
      toolset: ["read_file", "read_files"]
      ui_log_events:
        - on_agent_final_answer

    - name: "security_review"
      type: AgentComponent
      prompt_id: "security_prompt"
      inputs:
        - "context:goal"
        - "developer:output"
      toolset: ["read_file", "read_files"]
      ui_log_events:
        - on_agent_final_answer

    - name: "deployer"
      type: AgentComponent
      prompt_id: "deployer_prompt"
      inputs:
        - "context:goal"
        - "security_review:output"
      toolset: ["read_file", "read_files"]
      ui_log_events:
        - on_agent_final_answer

  prompts:
    - prompt_id: "planner_prompt"
      name: "Planner Prompt"
      prompt_template:
        system: |
          You are the Rivet Planner Agent. Analyze the provided Jira issue and generate a structured execution plan in JSON format with steps, effort estimates, risk assessment, and success criteria.
        user: |
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "developer_prompt"
      name: "Developer Prompt"
      prompt_template:
        system: |
          You are the Rivet Developer Agent. Execute the provided plan using TDD methodology (RED → GREEN → REFACTOR). Generate code, tests, and commit messages for each step.
        user: |
          Execute the following plan:
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 300

    - prompt_id: "security_prompt"
      name: "Security Review Prompt"
      prompt_template:
        system: |
          You are the Rivet Security Analyst. Review the code changes for OWASP Top 10 vulnerabilities, prompt injection risks, secret leakage, and compliance. Output severity-rated findings in JSON.
        user: |
          Review the following code changes:
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 180

    - prompt_id: "deployer_prompt"
      name: "Deployer Prompt"
      prompt_template:
        system: |
          You are the Rivet Deployer Agent. Select the optimal GCP region for deployment based on carbon intensity (70% weight) and compute cost (30% weight). Generate deployment configuration.
        user: |
          Deploy the following approved code:
          {{goal}}
        placeholder: history
      unit_primitives: []
      params:
        timeout: 120

  routers:
    - from: "planner"
      to: "developer"
    - from: "developer"
      to: "security_review"
    - from: "security_review"
      to: "deployer"
    - from: "deployer"
      to: "end"

  flow:
    entry_point: "planner"
